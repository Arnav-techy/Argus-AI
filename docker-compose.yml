version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Add your GEMINI_API_KEY and other backend env variables below
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./securescan-ai-main
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
