services:
  # Python Backend Web Service
  - type: web
    name: argus-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # You will supply this in the Render dashboard during deployment
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: argus-ai-frontend
    env: static
    rootDir: securescan-ai-main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: argus-ai-backend
          property: url
